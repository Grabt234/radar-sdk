name: Publish documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      # --- Added this step to fix the manimpango build failure ---
      - name: Install system dependencies for manimpango
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libpango1.0-dev pandoc

      - name: Install dependencies
        run: uv sync

      - name: Build Sphinx HTML
        run: uv run sphinx-build -a -E -b html docs docs/_build/html

      - name: Disable Jekyll on GitHub Pages
        run: touch docs/_build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4